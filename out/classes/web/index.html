<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>College Portal – RBAC System</title>
  <meta name="description" content="Role-Based Access Control College Portal – Secure, structured access for Admin, Faculty, and Students." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- LOGIN PAGE -->
  <div id="loginPage" class="page active">
    <div class="login-bg">
      <div class="login-orb orb-1"></div>
      <div class="login-orb orb-2"></div>
      <div class="login-orb orb-3"></div>
    </div>
    <div class="login-container">
      <div class="login-card glass-card">
        <div class="login-logo">
          <div class="logo-icon">🎓</div>
          <h1>College Portal</h1>
          <p class="login-subtitle">Role-Based Access Control System</p>
        </div>

        <div class="role-pills">
          <button class="role-pill" onclick="fillCreds('admin','admin123')" id="pill-admin">
            <span class="pill-icon">👑</span> Admin
          </button>
          <button class="role-pill" onclick="fillCreds('faculty1','faculty123')" id="pill-faculty">
            <span class="pill-icon">🧑‍🏫</span> Faculty
          </button>
          <button class="role-pill" onclick="fillCreds('student1','student123')" id="pill-student">
            <span class="pill-icon">🎒</span> Student
          </button>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrap">
              <span class="input-icon">👤</span>
              <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username" />
            </div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <span class="input-icon">🔑</span>
              <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password" />
              <button type="button" class="eye-btn" onclick="togglePwd()" id="eyeBtn">👁</button>
            </div>
          </div>
          <div id="loginError" class="error-msg hidden"></div>
          <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
            <span id="loginBtnText">Sign In</span>
            <span id="loginSpinner" class="spinner hidden"></span>
          </button>
        </form>

        <div class="login-footer">
          <p>Secured by RBAC • College Portal v1.0</p>
        </div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD PAGE -->
  <div id="dashboardPage" class="page">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">🎓</div>
        <div class="sidebar-text">
          <div class="sidebar-title">College Portal</div>
          <div class="sidebar-subtitle">RBAC System</div>
        </div>
        <button class="sidebar-toggle" onclick="toggleSidebar()" id="sidebarToggle">◀</button>
      </div>

      <div class="user-card-sidebar">
        <div class="avatar" id="sidebarAvatar">A</div>
        <div class="user-info-sidebar">
          <div class="user-name-sidebar" id="sidebarUserName">Loading...</div>
          <div class="role-badge" id="sidebarRoleBadge">—</div>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <!-- Dynamically built based on role -->
      </nav>

      <div class="sidebar-bottom">
        <button class="nav-item logout-btn" onclick="handleLogout()" data-label="Logout">
          <span class="nav-icon">🚪</span>
          <span class="nav-label">Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content" id="mainContent">
      <header class="topbar">
        <button class="hamburger" onclick="toggleSidebar()" id="hamburger">☰</button>
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
        <div class="topbar-right">
          <div class="topbar-user">
            <div class="avatar sm" id="topbarAvatar">A</div>
            <span id="topbarUserName">—</span>
          </div>
        </div>
      </header>

      <!-- Content panels -->
      <div class="content-area" id="contentArea">
        <!-- Injected by JS -->
      </div>
    </main>
  </div>

  <!-- TOAST NOTIFICATIONS -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- MODAL -->
  <div id="modal" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal-box glass-card" id="modalBox">
      <div class="modal-header">
        <h3 id="modalTitle">Modal</h3>
        <button class="modal-close" onclick="closeModalDirect()">✕</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
